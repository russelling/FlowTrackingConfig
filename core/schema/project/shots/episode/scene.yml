# Dynamic folder – one per Scene entity linked to the parent Episode.
# Folder name comes from Scene.code (e.g. 010)
# Scene must be linked to its Episode via the sg_episode field.
type: "shotgun_entity"
name: "code"
entity_type: "Scene"
filters:
  - { "path": "sg_episode", "relation": "is", "values": [ "$episode" ] }
