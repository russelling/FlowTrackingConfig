keys:
    Sequence:
        type: str
    Episode:
        type: str
    Scene:
        type: str
    Shot:
        type: str
    Step:
        type: str
    sg_asset_type:
        type: str
    Asset:
        type: str
    name:
        type: str
        filter_by: alphanumeric
    iteration:
        type: int
    version:
        type: int
        format_spec: "03"
    version_four:
       type: int
       format_spec: "04"
       alias: version
    timestamp:
        type: str
    width:
        type: int
    height:
        type: int
    segment_name:
        type: str
    nuke.output:
        alias: output
        type: str
        filter_by: alphanumeric
    afx.comp:
        alias: comp
        type: str
        filter_by: alphanumeric
    afx.mov.ext:
        alias: extension
        type: str
        choices:
            mov: Quicktime Movie (.mov)
            avi: Audio Video Interleaved (.avi)
    SEQ:
        type: sequence
        format_spec: "04"
    flame.frame:
        type: sequence
        format_spec: "08"
    eye:
        type: str
    nuke_extension:
        type: str
        choices:
            nk: Nuke Script (.nk)
            nknc: Nuke Non-Commercial (.nknc)
        default: nk
    maya_extension:
        type: str
        choices:
            ma: Maya ASCII (.ma)
            mb: Maya Binary (.mb)
        default: ma
        alias: extension
    img_extension:
        type: str
        choices:
            exr: OpenEXR (.exr)
            png: PNG (.png)
            jpg: JPEG (.jpg)
            dpx: DPX (.dpx)
    houdini.node:
        alias: node
        type: str
    aov_name:
        type: str
    YYYY:
        type: int
        format_spec: "04"
    MM:
        type: int
        format_spec: "02"
    DD:
        type: int
        format_spec: "02"
        alias: DD
    project:
        type: str
    UDIM:
        type: sequence
        default: "<UDIM>"
    mari.channel:
        type: str
        alias: channel
    mari.layer:
        type: str
        alias: layer
    mari.project_name:
        type: str
        alias: name
    asset_name:
        type: str
        shotgun_entity_type: Asset
        shotgun_field_name: code
    task_name:
        type: str
        shotgun_entity_type: Task
        shotgun_field_name: content
    alias.extension:
        type: str
        filter_by: alphanumeric
    vred.render_pass:
        type: str
        filter_by: alphanumeric
    vred.render_extension:
        type: str
        choices:
            png: PNG Image
            exr: EXR Image
        default: png
    vred.frame:
        type: sequence
        format_spec: "05"
        alias: SEQ

paths:

    # -------------------------------------------------------------------------
    # Path aliases
    # -------------------------------------------------------------------------
    shot_root: shots/{Episode}/{Scene}/{Shot}/{Step}
    shot_base: shots/{Episode}/{Scene}/{Shot}
    asset_root: assets/{sg_asset_type}/{Asset}/{Step}
    sequence_root: sequences/{Sequence}

    ##########################################################################################
    # Episodic shot templates  (shots/{Episode}/{Scene}/{Shot}/{Step})
    ##########################################################################################

    # ── Nuke ─────────────────────────────────────────────────────────────────
    shot_work_area_nuke: &shot_area_nuke
        definition: '@shot_root/nuke'
    shot_publish_area_nuke: *shot_area_nuke

    ep_nuke_shot_work: &ep_nuke_shot_file
        definition: '@shot_root/nuke/{Shot}_{Step}_v{version}.{nuke_extension}'
    ep_nuke_shot_publish: *ep_nuke_shot_file
    
    ep_nuke_shot_snapshot:
        definition: '@shot_root/nuke/snapshots/{Shot}_{Step}_v{version}_{timestamp}.{nuke_extension}'

    # ── Maya ─────────────────────────────────────────────────────────────────
    shot_work_area_maya: &shot_area_maya
        definition: '@shot_root/maya'
    shot_publish_area_maya: *shot_area_maya

    ep_maya_shot_work: &ep_maya_shot_file
        definition: '@shot_root/maya/{Shot}_{Step}_v{version}.{maya_extension}'
    ep_maya_shot_publish: *ep_maya_shot_file

    ep_maya_shot_snapshot:
        definition: '@shot_root/maya/snapshots/{Shot}_{Step}_v{version}_{timestamp}.{maya_extension}'

    # ── Renders (shot level, shared across steps) ─────────────────────────────
    # FIXED: Added {nuke.output} to prevent Write nodes overwriting each other
    ep_nuke_shot_render_work: &ep_nuke_render_file
        definition: '@shot_base/render/{Shot}_{Step}_{nuke.output}_v{version}/{Shot}_{Step}_{nuke.output}_v{version}.{SEQ}.exr'
    ep_nuke_shot_render_pub: *ep_nuke_render_file

    # ── Review / dailies (shot level, shared across steps) ───────────────────
    ep_nuke_shot_render_movie:
        definition: '@shot_base/review/{Shot}_{Step}_v{version}.mov'

    shot_quicktime_quick:
        definition: '@shot_base/review/{Shot}_{Step}_{iteration}.mov'

    # ── Plates, CDL, LUT (shot level, shared across steps) ───────────────────
    ep_shot_plates:
        definition: '@shot_base/plates/{Shot}.####.exr'

    ep_shot_cdl:
        definition: '@shot_base/plates/{Shot}.cc'

    ep_shot_show_lut:
        definition: 'color/luts/ARRILogC4_SEV_S3_V3_digital_R709.cube'


    ##########################################################################################
    # Project level paths
    ##########################################################################################

    # The location of WIP files
    hiero_project_work: &hiero_file
        definition: 'editorial/work/{name}_v{version}.hrox'
    hiero_project_publish: *hiero_file

    hiero_project_work_area: &hiero_area
        definition: 'editorial/work'
    hiero_project_publish_area: *hiero_area

    # The location of backups of WIP files
    hiero_project_snapshot:
        definition: 'editorial/work/snapshots/{name}_v{version}_{timestamp}.hrox'


    ##########################################################################################
    # Shot level paths (legacy / non-episodic DCCs)
    ##########################################################################################

    #
    # Flame (FIXED: Re-routed to episodic @shot_base)
    #
    flame_segment_clip:
        definition: '@shot_base/finishing/clip/sources/{segment_name}.clip'
    flame_shot_clip:
        definition: '@shot_base/finishing/clip/{Shot}.clip'
    flame_shot_batch:
        definition: '@shot_base/finishing/batch/{Shot}.v{version}.batch'
    flame_shot_render_dpx:
        definition: '@shot_base/finishing/renders/{segment_name}_v{version}/{Shot}_{segment_name}_v{version}.{flame.frame}.dpx'
    flame_shot_render_exr:
        definition: '@shot_base/finishing/renders/{segment_name}_v{version}/{Shot}_{segment_name}_v{version}.{flame.frame}.exr'
    flame_shot_comp_dpx:
        definition: '@shot_base/finishing/comp/{segment_name}_v{version}/{Shot}_{segment_name}_v{version}.{flame.frame}.dpx'
    flame_shot_comp_exr:
        definition: '@shot_base/finishing/comp/{segment_name}_v{version}/{Shot}_{segment_name}_v{version}.{flame.frame}.exr'

    #
    # After Effects
    #
    shot_work_area_aftereffects: &shot_area_afx
        definition: '@shot_root/afx'
    shot_publish_area_aftereffects: *shot_area_afx
    
    aftereffects_shot_work: &afx_shot_file
        definition: '@shot_root/afx/{name}.v{version}.aep'
    aftereffects_shot_publish: *afx_shot_file
    
    aftereffects_shot_snapshot:
        definition: '@shot_root/afx/snapshots/{name}.v{version}.{timestamp}.aep'
    aftereffects_shot_render_pub_mono:
        definition: '@shot_base/render/{name}/v{version}/{width}x{height}/{Shot}_{name}_{afx.comp}_v{version}.{SEQ}.tif'
    aftereffects_shot_render_movie:
        definition: '@shot_base/review/{Shot}_{name}_{afx.comp}_v{version}.{afx.mov.ext}'

    #
    # Houdini
    #
    shot_work_area_houdini: &shot_area_houdini
        definition: '@shot_root/houdini'
    shot_publish_area_houdini: *shot_area_houdini
    
    houdini_shot_work: &houdini_shot_file
        definition: '@shot_root/houdini/{name}.v{version}.hip'
    houdini_shot_publish: *houdini_shot_file
    
    houdini_shot_snapshot:
        definition: '@shot_root/houdini/snapshots/{name}.v{version}.{timestamp}.hip'
    houdini_shot_work_alembic_cache:
        definition: '@shot_root/cache/alembic/{name}/{houdini.node}/v{version}/{Shot}_{name}_v{version}.abc'
    houdini_shot_render:
        definition: '@shot_base/render/{name}/{houdini.node}/v{version}/{width}x{height}/{Shot}_{name}_v{version}.{SEQ}.exr'
    houdini_shot_ifd:
        definition: '@shot_root/ifds/{name}/{houdini.node}/v{version}/{width}x{height}/{Shot}_{name}_v{version}.{SEQ}.ifd'
    houdini_shot_dcm:
        definition: '@shot_root/dcms/{name}/{houdini.node}/v{version}/{width}x{height}/{Shot}_{name}_v{version}.{SEQ}.dcm'
    houdini_shot_extra_plane:
        definition: '@shot_base/render/{name}/{houdini.node}/{aov_name}/v{version}/{width}x{height}/{Shot}_{name}_v{version}.{SEQ}.exr'

    #
    # 3dsmax
    #
    shot_work_area_max: &shot_area_max
        definition: '@shot_root/3dsmax'
    shot_publish_area_max: *shot_area_max
    
    max_shot_work: &max_shot_file
        definition: '@shot_root/3dsmax/{name}.v{version}.max'
    max_shot_publish: *max_shot_file
    
    max_shot_snapshot:
        definition: '@shot_root/3dsmax/snapshots/{name}.v{version}.{timestamp}.max'

    #
    # Motionbuilder
    #
    shot_work_area_mobu: &shot_area_mobu
        definition: '@shot_root/mobu'
    shot_publish_area_mobu: *shot_area_mobu
    
    mobu_shot_work: &mobu_shot_file
        definition: '@shot_root/mobu/{name}.v{version}.fbx'
    mobu_shot_publish: *mobu_shot_file
    
    mobu_shot_snapshot:
        definition: '@shot_root/mobu/snapshots/{name}.v{version}.{timestamp}.fbx'

    #
    # Photoshop
    #
    shot_work_area_photoshop: &shot_area_photoshop
        definition: '@shot_root/photoshop'
    shot_publish_area_photoshop: *shot_area_photoshop
    
    photoshop_shot_work: &photoshop_shot_file
        definition: '@shot_root/photoshop/{name}.v{version}.psd'
    photoshop_shot_publish: *photoshop_shot_file
    
    photoshop_shot_snapshot:
        definition: '@shot_root/photoshop/snapshots/{name}.v{version}.{timestamp}.psd'
    photoshop_shot_png_publish:
        definition: '@shot_root/photoshop/{name}.v{version}.png'
    photoshop_shot_jpg_publish:
        definition: '@shot_root/photoshop/{name}.v{version}.jpg'

    #
    # Nuke (legacy - non-episodic)
    #
    nuke_shot_work: &nuke_legacy_file
        definition: '@shot_root/nuke/{name}.v{version}.nk'
    nuke_shot_publish: *nuke_legacy_file
    
    nuke_shot_snapshot:
        definition: '@shot_root/nuke/snapshots/{name}.v{version}.{timestamp}.nk'
    nuke_shot_render_mono_dpx: &nuke_legacy_render_dpx
        definition: '@shot_base/render/{name}/v{version}/{width}x{height}/{Shot}_{name}_{nuke.output}_v{version}.{SEQ}.dpx'
    nuke_shot_render_pub_mono_dpx: *nuke_legacy_render_dpx
    
    nuke_shot_render_stereo: &nuke_legacy_render_stereo
        definition: '@shot_base/render/{name}/v{version}/{width}x{height}/{Shot}_{name}_{nuke.output}_{eye}_v{version}.{SEQ}.exr'
    nuke_shot_render_pub_stereo: *nuke_legacy_render_stereo
    
    nuke_shot_render_movie:
        definition: '@shot_base/review/{Shot}_{name}_{nuke.output}_v{version}.mov'

    #
    # Hiero (FIXED: Re-routed to episodic @shot_base)
    #
    hiero_plate_path:
        definition: '@shot_base/editorial/{YYYY}_{MM}_{DD}/plates/{project}_{Shot}.mov'
    hiero_render_path:
        definition: '@shot_base/editorial/{YYYY}_{MM}_{DD}/renders/{project}_{Shot}.{SEQ}.dpx'


    ##########################################################################################
    # Asset pipeline
    ##########################################################################################

    asset_alembic_cache:
        definition: '@asset_root/publish/caches/{name}.v{version}.abc'

    #
    # Photoshop
    #
    asset_work_area_photoshop: &asset_area_photoshop
        definition: '@asset_root/work/photoshop'
    asset_publish_area_photoshop: *asset_area_photoshop
    
    photoshop_asset_work: &photoshop_asset_file
        definition: '@asset_root/work/photoshop/{name}.v{version}.psd'
    photoshop_asset_publish: *photoshop_asset_file
    
    photoshop_asset_snapshot:
        definition: '@asset_root/work/photoshop/snapshots/{name}.v{version}.{timestamp}.psd'
    photoshop_asset_png_publish:
        definition: '@asset_root/publish/photoshop/{name}.v{version}.png'
    photoshop_asset_jpg_publish:
        definition: '@asset_root/publish/photoshop/{name}.v{version}.jpg'

    #
    # After Effects
    #
    asset_work_area_aftereffects: &asset_area_afx
        definition: '@asset_root/work/afx'
    asset_publish_area_aftereffects: *asset_area_afx
    
    aftereffects_asset_work: &afx_asset_file
        definition: '@asset_root/work/afx/{name}.v{version}.aep'
    aftereffects_asset_publish: *afx_asset_file
    
    aftereffects_asset_snapshot:
        definition: '@asset_root/work/afx/snapshots/{name}.v{version}.{timestamp}.aep'
    aftereffects_asset_render_pub_mono:
        definition: '@asset_root/publish/elements/{name}/v{version}/{width}x{height}/{Asset}_{name}_{afx.comp}_v{version}.{SEQ}.tif'
    aftereffects_asset_render_movie:
        definition: '@asset_root/review/{Asset}_{name}_{afx.comp}_v{version}.{afx.mov.ext}'

    #
    # Mari
    #
    asset_mari_texture_tif:
        definition: '@asset_root/publish/mari/{name}_{mari.channel}[_{mari.layer}].v{version}.{UDIM}.tif'

    #
    # Maya
    #
    asset_work_area_maya: &asset_area_maya
        definition: '@asset_root/work/maya'
    asset_publish_area_maya: *asset_area_maya
    
    maya_asset_work: &maya_asset_file
        definition: '@asset_root/work/maya/{name}.v{version}.{maya_extension}'
    maya_asset_publish: *maya_asset_file
    
    maya_asset_snapshot:
        definition: '@asset_root/work/maya/snapshots/{name}.v{version}.{timestamp}.{maya_extension}'

    #
    # Houdini
    #
    asset_work_area_houdini: &asset_area_houdini
        definition: '@asset_root/work/houdini'
    asset_publish_area_houdini: *asset_area_houdini
    
    houdini_asset_work: &houdini_asset_file
        definition: '@asset_root/work/houdini/{name}.v{version}.hip'
    houdini_asset_publish: *houdini_asset_file
    
    houdini_asset_snapshot:
        definition: '@asset_root/work/houdini/snapshots/{name}.v{version}.{timestamp}.hip'
    houdini_asset_work_alembic_cache:
        definition: '@asset_root/work/houdini/cache/alembic/{name}/{houdini.node}/v{version}/{Asset}_{name}_v{version}.abc'
    houdini_asset_render:
        definition: '@asset_root/work/images/{name}/{houdini.node}/v{version}/{width}x{height}/{Asset}_{name}_v{version}.{SEQ}.exr'
    houdini_asset_ifd:
        definition: '@asset_root/work/ifds/{name}/{houdini.node}/v{version}/{width}x{height}/{Asset}_{name}_v{version}.{SEQ}.ifd'
    houdini_asset_dcm:
        definition: '@asset_root/work/dcms/{name}/{houdini.node}/v{version}/{width}x{height}/{Asset}_{name}_v{version}.{SEQ}.dcm'
    houdini_asset_extra_plane:
        definition: '@asset_root/work/images/{name}/{houdini.node}/{aov_name}/v{version}/{width}x{height}/{Asset}_{name}_v{version}.{SEQ}.exr'

    #
    # 3dsmax
    #
    asset_work_area_max: &asset_area_max
        definition: '@asset_root/work/3dsmax'
    asset_publish_area_max: *asset_area_max
    
    max_asset_work: &max_asset_file
        definition: '@asset_root/work/3dsmax/{name}.v{version}.max'
    max_asset_publish: *max_asset_file
    
    max_asset_snapshot:
        definition: '@asset_root/work/3dsmax/snapshots/{name}.v{version}.{timestamp}.max'

    #
    # Motionbuilder
    #
    asset_work_area_mobu: &asset_area_mobu
        definition: '@asset_root/work/mobu'
    asset_publish_area_mobu: *asset_area_mobu
    
    mobu_asset_work: &mobu_asset_file
        definition: '@asset_root/work/mobu/{name}.v{version}.fbx'
    mobu_asset_publish: *mobu_asset_file
    
    mobu_asset_snapshot:
        definition: '@asset_root/work/mobu/snapshots/{name}.v{version}.{timestamp}.fbx'

    #
    # Nuke
    #
    asset_work_area_nuke: &asset_area_nuke
        definition: '@asset_root/work/nuke'
    asset_publish_area_nuke: *asset_area_nuke
    
    nuke_asset_render: &nuke_asset_render_file
        definition: '@asset_root/work/images/{name}/v{version}/{width}x{height}/{Asset}_{name}_{nuke.output}_v{version}.{SEQ}.exr'
    nuke_asset_render_pub: *nuke_asset_render_file
    
    nuke_asset_render_movie:
        definition: '@asset_root/review/{Asset}_{name}_{nuke.output}_v{version}.mov'
    asset_quicktime_quick:
        definition: '@asset_root/review/quickdaily/{Asset}_{name}_{iteration}.mov'
    
    nuke_asset_work: &nuke_asset_file
        definition: '@asset_root/work/nuke/{name}.v{version}.nk'
    nuke_asset_publish: *nuke_asset_file
    
    nuke_asset_snapshot:
        definition: '@asset_root/work/nuke/snapshots/{name}.v{version}.{timestamp}.nk'

    #
    # Alias
    #
    asset_work_area_alias: &asset_area_alias
        definition: '@asset_root/work/alias'
    asset_publish_area_alias: *asset_area_alias
    
    alias_asset_work: &alias_asset_file
        definition: '@asset_root/work/alias/{name}.v{version}.wire'
    alias_asset_publish: *alias_asset_file
    
    alias_asset_snapshot:
        definition: '@asset_root/work/alias/snapshots/{name}.v{version}.{timestamp}.wire'
    alias_asset_reference_publish:
        definition: '@asset_root/publish/alias/translations/{name}_{alias.extension}.v{version}.wref'
    alias_asset_igs_publish:
        definition: '@asset_root/publish/alias/translations/{name}.v{version}.igs'
    alias_asset_catpart_publish:
        definition: '@asset_root/publish/alias/translations/{name}.v{version}.CATPart'
    alias_asset_jt_publish:
        definition: '@asset_root/publish/alias/translations/{name}.v{version}.jt'
    alias_asset_stp_publish:
        definition: '@asset_root/publish/alias/translations/{name}.v{version}.stp'
    alias_asset_wref_publish:
        definition: '@asset_root/publish/alias/translations/{name}.v{version}.wref'

    #
    # VRED
    #
    asset_work_area_vred: &asset_area_vred
        definition: '@asset_root/work/vred'
    asset_publish_area_vred: *asset_area_vred
    
    vred_asset_work: &vred_asset_file
        definition: '@asset_root/work/vred/{name}.v{version}.vpb'
    vred_asset_publish: *vred_asset_file
    
    vred_asset_snapshot:
        definition: '@asset_root/work/vred/snapshots/{name}.v{version}.{timestamp}.vpb'
    
    vred_asset_render_work: &vred_render_file
        definition: '@asset_root/work/images/{name}/v{version}/{Asset}_{name}_v{version}[-{vred.render_pass}].{vred.render_extension}'
    vred_asset_render_publish: *vred_render_file
    
    vred_asset_render_sequence_work: &vred_render_seq_file
        definition: '@asset_root/work/images/{name}/v{version}/{Asset}_{name}_v{version}[-{vred.render_pass}]-{vred.frame}.{vred.render_extension}'
    vred_asset_render_sequence_publish: *vred_render_seq_file

strings:
    nuke_shot_version_name: "{Shot}_{Step}_{nuke.output}_v{version}.{iteration}"
    nuke_quick_shot_version_name: "{Shot}_{Step}_quick_{iteration}"
    nuke_asset_version_name: "{Asset}_{name}_{nuke.output}_v{version}.{iteration}"
    nuke_quick_asset_version_name: "{Asset}_{name}_quick_{iteration}"
    hiero_version: "{version}"
    mari_asset_project_name: "{mari.project_name} - Asset {asset_name}, {task_name}"